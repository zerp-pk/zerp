services:
  app:
    build:
      context: ..
      dockerfile: zerp/Dockerfile
    ports:
      - "8000:80"
    env_file:
      - .env
    environment:
      DB_HOST: db
      REDIS_HOST: redis
    depends_on:
      - db
      - redis
    volumes:
      - storage_data:/var/www/html/storage/app

  db:
    image: mysql:8
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-zerp}
      MYSQL_USER: ${DB_USERNAME:-zerp}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  redis:
    image: redis:7
    restart: unless-stopped

volumes:
  db_data:
  storage_data:
